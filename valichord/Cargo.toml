[workspace]
resolver = "2"
members = [
    "shared_types",
    "dnas/attestation/zomes/attestation_integrity",
    "dnas/attestation/zomes/attestation_coordinator",
]

[workspace.dependencies]
hdi = "0.7"
hdk = "0.6"
serde = { version = "1", features = ["derive"] }

# getrandom 0.3 requires an explicit backend for wasm32-unknown-unknown.
# Holochain zomes never call getrandom directly (HDK host functions handle
# randomness), so wasm_js is fine here — it satisfies the compiler without
# being invoked at runtime.
getrandom = { version = "0.3", features = ["wasm_js"] }
