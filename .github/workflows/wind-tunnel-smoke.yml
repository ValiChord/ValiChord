name: Wind-Tunnel build + unit tests

# Deterministic CI signal for the wind-tunnel scenarios: compile every scenario
# (against the native holochain stack) and run the pure-logic unit tests.
#
# Why not a live run? A live multi-conductor run was tried in CI twice and both
# failed for environment (not code) reasons on a standard 2-core/7GB GitHub
# runner: (1) the per-agent conductors couldn't peer (the wind-tunnel 0.7.0
# Holochain runner uses the default public bootstrap with no local-bootstrap
# knob), and (2) the runner couldn't bring up three 4-DNA conductors before a
# startup timeout cancelled setup. The live run works on a well-resourced machine
# (median ~185ms cross-agent propagation) — see valichord/wind-tunnel/README.md —
# so it stays local. CI gates on what's reliable: it builds and unit-tests.
#
# Path-filtered so it only runs when wind-tunnel code changes; also manually
# dispatchable.
on:
  push:
    branches: [main]
    paths:
      - 'valichord/wind-tunnel/**'
      - '.github/workflows/wind-tunnel-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'valichord/wind-tunnel/**'
      - '.github/workflows/wind-tunnel-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: build all scenarios + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('valichord/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      # Native wind-tunnel build (full native holochain) is the long pole on a
      # cold cache; cache it keyed on the wind-tunnel lockfile.
      - name: Cache wind-tunnel build
        uses: actions/cache@v4
        with:
          path: valichord/wind-tunnel/target
          key: ${{ runner.os }}-wt-${{ hashFiles('valichord/wind-tunnel/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wt-

      # Compiles all five scenarios + the shared valichord_wt_common crate against
      # the native conductor stack — catches API / dependency / install-path
      # regressions (e.g. the runner 0.7 bump, the pkcs8/ed25519 pins).
      - name: Build all scenarios
        working-directory: valichord/wind-tunnel
        run: cargo build

      # Pure-logic unit tests (no conductor): unique_data_hash collision-freedom
      # + the propagation-lag math incl. the saturating-skew guard.
      - name: Unit tests (dht_sync_lag)
        working-directory: valichord/wind-tunnel
        run: cargo test -p dht_sync_lag
