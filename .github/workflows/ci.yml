name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 97 Integration Tests (4 DNAs)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # ── Caches ─────────────────────────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('valichord/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      # Static key: busts only when we edit the version string below.
      # Both jobs share this key — whichever runs first populates it.
      - name: Cache Holochain binaries
        uses: actions/cache@v4
        id: cache-hc-bin
        with:
          path: ~/.local/bin/hc-tools
          key: ${{ runner.os }}-hc-bin-0.6.1

      - name: Cache WASM build artifacts
        uses: actions/cache@v4
        id: cache-wasm
        with:
          path: valichord/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('valichord/**/*.rs', 'valichord/**/Cargo.toml', 'valichord/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      # ── Download pre-built Holochain binaries (skipped on cache hit) ────────
      # Binaries are published to the holochain/holochain GitHub release.
      # Downloading takes ~10 s vs ~20 min for cargo install from source.
      - name: Download Holochain binaries
        if: steps.cache-hc-bin.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin/hc-tools
          BASE=https://github.com/holochain/holochain/releases/download/holochain-0.6.1
          curl -sSL $BASE/holochain-x86_64-unknown-linux-gnu              -o ~/.local/bin/hc-tools/holochain
          curl -sSL $BASE/hc-x86_64-unknown-linux-gnu                     -o ~/.local/bin/hc-tools/hc
          curl -sSL $BASE/lair-keystore-x86_64-unknown-linux-gnu          -o ~/.local/bin/hc-tools/lair-keystore
          curl -sSL $BASE/kitsune2-bootstrap-srv-x86_64-unknown-linux-gnu -o ~/.local/bin/hc-tools/kitsune2-bootstrap-srv
          chmod +x ~/.local/bin/hc-tools/*

      - name: Add Holochain tools to PATH
        run: echo "$HOME/.local/bin/hc-tools" >> $GITHUB_PATH

      # ── Build WASMs (skipped on cache hit) ─────────────────────────────────
      - name: Build WASM zomes
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        working-directory: valichord
        run: cargo build --target wasm32-unknown-unknown --release

      # ── Pack DNAs and hApp (always — yaml changes don't invalidate wasm cache)
      - name: Pack DNAs and bundle hApp
        working-directory: valichord
        run: |
          hc dna pack dnas/attestation            -o workdir/attestation.dna
          hc dna pack dnas/researcher_repository  -o workdir/researcher_repository.dna
          hc dna pack dnas/validator_workspace    -o workdir/validator_workspace.dna
          hc dna pack dnas/governance             -o workdir/governance.dna
          hc app pack .                           -o workdir/valichord.happ

      # ── Node / test deps ────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: valichord/tests/package-lock.json

      - name: Install test dependencies
        working-directory: valichord/tests
        run: npm install

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Kill any orphaned Holochain processes
        run: |
          pkill -f holochain   || true
          pkill -f lair-keystore || true
          sleep 2

      - name: Run integration tests
        working-directory: valichord/tests
        run: npm test

  # ── Sweettest: one parallel job per test binary ──────────────────────────────
  # Each matrix leg runs a single --test binary so all five run concurrently.
  # Wall-clock is ~the slowest binary (governance ≈170 min) not their serial sum.
  # fail-fast:false lets all legs report even when one fails.
  # Governance gets its own timeout_minutes: 200 (gold badge=34 min, silver=30 min).
  sweettest:
    name: Sweettest (${{ matrix.test }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: attestation           # 19 tests ≈  80 min
            timeout_minutes: 150
          - test: governance            # 17 tests ≈ 170 min (gold=34 min, silver=30 min)
            timeout_minutes: 200
          - test: security              #  7 tests ≈  30 min
            timeout_minutes: 150
          - test: researcher_repository # 17 tests ≈  70 min
            timeout_minutes: 150
          - test: validator_workspace   #  9 tests ≈  38 min
            timeout_minutes: 150

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain (same pin as the workspace) ──────────────────────────
      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # ── System C/C++ deps needed by openssl-sys (sweettest dep tree) ────────
      - name: Install build dependencies
        run: sudo apt-get install -y cmake libssl-dev pkg-config

      # ── Cargo registry cache (covers sweettest's large dep tree) ────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-sweettest-${{ hashFiles('valichord/sweettest_integration/Cargo.lock', 'valichord/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-sweettest-
            ${{ runner.os }}-cargo-registry-

      # ── Cache the sweettest build artifacts ─────────────────────────────────
      # All matrix legs share the same cache key — first save wins, rest are
      # no-ops.  On subsequent runs all legs restore the compiled target dir.
      - name: Cache sweettest build artifacts
        uses: actions/cache@v4
        with:
          path: valichord/sweettest_integration/target
          key: ${{ runner.os }}-sweettest-target-${{ hashFiles('valichord/sweettest_integration/Cargo.lock', 'valichord/sweettest_integration/**/*.rs', 'valichord/**/*.rs', 'valichord/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-sweettest-target-

      # ── Restore packed DNAs from the parent job's WASM cache ────────────────
      - name: Restore WASM build artifacts
        uses: actions/cache@v4
        with:
          path: valichord/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('valichord/**/*.rs', 'valichord/**/Cargo.toml', 'valichord/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      # ── Holochain CLI — shared cache with the test job ───────────────────────
      - name: Cache Holochain binaries
        uses: actions/cache@v4
        id: cache-hc-bin-sweettest
        with:
          path: ~/.local/bin/hc-tools
          key: ${{ runner.os }}-hc-bin-0.6.1

      - name: Download Holochain binaries
        if: steps.cache-hc-bin-sweettest.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin/hc-tools
          BASE=https://github.com/holochain/holochain/releases/download/holochain-0.6.1
          curl -sSL $BASE/holochain-x86_64-unknown-linux-gnu              -o ~/.local/bin/hc-tools/holochain
          curl -sSL $BASE/hc-x86_64-unknown-linux-gnu                     -o ~/.local/bin/hc-tools/hc
          curl -sSL $BASE/lair-keystore-x86_64-unknown-linux-gnu          -o ~/.local/bin/hc-tools/lair-keystore
          curl -sSL $BASE/kitsune2-bootstrap-srv-x86_64-unknown-linux-gnu -o ~/.local/bin/hc-tools/kitsune2-bootstrap-srv
          chmod +x ~/.local/bin/hc-tools/*

      - name: Add Holochain tools to PATH
        run: echo "$HOME/.local/bin/hc-tools" >> $GITHUB_PATH

      # ── Build WASMs and pack DNAs ────────────────────────────────────────────
      - name: Build WASM zomes and pack DNAs
        working-directory: valichord
        run: |
          cargo build --target wasm32-unknown-unknown --release
          hc dna pack dnas/attestation            -o workdir/attestation.dna
          hc dna pack dnas/researcher_repository  -o workdir/researcher_repository.dna
          hc dna pack dnas/validator_workspace    -o workdir/validator_workspace.dna
          hc dna pack dnas/governance             -o workdir/governance.dna
          hc app pack .                           -o workdir/valichord.happ

      # ── Kill any stray conductors, then run this binary's tests ─────────────
      - name: Kill any orphaned Holochain processes
        run: |
          pkill -f holochain     || true
          pkill -f lair-keystore || true
          sleep 2

      - name: Run Sweettest (${{ matrix.test }})
        working-directory: valichord/sweettest_integration
        run: cargo test --test ${{ matrix.test }} -- --test-threads=1
