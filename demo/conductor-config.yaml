# ValiChord demo conductor — single persistent node.
#
# Run holochain from the demo/ directory so that the relative paths below
# resolve correctly:
#   cd demo && echo "demo-passphrase" | holochain --config-path conductor-config.yaml --piped
#
# Admin WebSocket : ws://localhost:4444   (setup.mjs and hc sandbox call)
# App   WebSocket : ws://localhost:4500   (attached by setup.mjs)

data_root_path: ./conductor_data
keystore:
  type: lair_server_in_proc
  lair_root: ./conductor_data/ks
admin_interfaces:
  - driver:
      type: websocket
      port: 4444
      allowed_origins: '*'
network:
  # Local bootstrap + SBD signal server (started by start_oracle.sh step 1).
  # Avoids any dependency on dev-test-bootstrap2.holochain.org, which causes
  # tx5 "Peer connection failed" errors in single-agent demo mode.
  bootstrap_url: http://localhost:9000
  signal_url: ws://localhost:9000
  advanced:
    tx5Transport:
      # Allow ws:// (plain text) connections to the local signal server.
      signalAllowPlainText: true
db_sync_strategy: Resilient
