# ValiChord demo conductor — single persistent node.
#
# Run holochain from the demo/ directory so that the relative paths below
# resolve correctly:
#   cd demo && echo "demo-passphrase" | holochain --config-path conductor-config.yaml --piped
#
# Admin WebSocket : ws://localhost:4444   (setup.mjs and hc sandbox call)
# App   WebSocket : ws://localhost:4500   (attached by setup.mjs)

data_root_path: ./conductor_data
keystore:
  type: lair_server_in_proc
  lair_root: ./conductor_data/ks
admin_interfaces:
  - driver:
      type: websocket
      port: 4444
      allowed_origins: '*'
network:
  bootstrap_url: https://dev-test-bootstrap2.holochain.org/
  signal_url: wss://dev-test-bootstrap2.holochain.org/
db_sync_strategy: Resilient
