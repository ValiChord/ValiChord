services:
  - type: web
    name: valichord-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 --workers 1 --threads 4 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: valichord-demo
    runtime: docker
    dockerfilePath: ./demo/Dockerfile
    # Build context is the repo root so COPY can reach both demo/ and valichord/workdir/
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
